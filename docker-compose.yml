services:
  db:
    image: mysql:8.0
    container_name: cyberteka-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: cyberteka
      MYSQL_USER: cyberteka
      MYSQL_PASSWORD: cyberteka
      MYSQL_ROOT_PASSWORD: root
      TZ: Europe/Moscow
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/cyberteka.sql:/docker-entrypoint-initdb.d/01-cyberteka.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - cyberteka-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyberteka-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: cyberteka
      DB_USER: cyberteka
      DB_PASS: cyberteka
      DB_CHARSET: utf8mb4
      APP_NAME: Cyberteka
      APP_SESSION_NAME: cyberteka_session
      APP_TIMEZONE: Europe/Moscow
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
    networks:
      - cyberteka-net

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: cyberteka-phpmyadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: cyberteka
      PMA_PASSWORD: cyberteka
      UPLOAD_LIMIT: 64M
    ports:
      - "8081:80"
    networks:
      - cyberteka-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cyberteka-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      BACKEND_URL: http://backend
    ports:
      - "3000:3000"
    networks:
      - cyberteka-net

volumes:
  mysql_data:
  frontend_node_modules:

networks:
  cyberteka-net:
    driver: bridge
